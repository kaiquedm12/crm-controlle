services:
  auth-service:
    image: node:22-alpine
    container_name: crm-controlle-auth-service
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3331:3331"
    volumes:
      - ./:/app
      - auth_node_modules:/app/node_modules
    command: sh -c "npm install && npm run prisma:generate && npm run dev:auth"

  crm-service:
    image: node:22-alpine
    container_name: crm-controlle-crm-service
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3332:3332"
    volumes:
      - ./:/app
      - crm_node_modules:/app/node_modules
    command: sh -c "npm install && npm run prisma:generate && npm run dev:crm"

volumes:
  auth_node_modules:
  crm_node_modules:
